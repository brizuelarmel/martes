  <script>
    document.querySelectorAll('.qmd-download').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const originalHref = this.getAttribute('href');
        const baseName = originalHref.replace('.qmd', '');
        
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const timestamp = `${year}_${month}_${day}_${hours}_${minutes}_${seconds}`;
        const filename = `${baseName}_${timestamp}.qmd`;
        
        const downloadLink = document.createElement('a');
        downloadLink.href = originalHref;
        downloadLink.download = filename;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
      });
    });
  </script>
